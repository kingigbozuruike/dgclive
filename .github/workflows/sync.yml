name: Sync to Personal Repo

on:
  push:
    branches:
      - main  # or your default branch

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Org Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Personal Repo
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_REPO_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote add personal "https://kingigbozuruike:${PERSONAL_TOKEN}@github.com/kingigbozuruike/dgclive.git"
          git push personal main --force